name: Pre-check
on:
  push:
    branches: [ main ]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: './.test'
      env:
        SHELLCHECK_OPTS: -e SC2028

    # Run Shellcheck on solutions
    - name: Check solutions
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: './solution'
